<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Register - Dark Drive</title><link rel="stylesheet" href="css/main.css">
<style>.auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .auth-box { width: 100%; max-width: 420px; padding: 40px; text-align: center; } .auth-box h2 { font-size: 2.5rem; color: var(--neon-purple); margin-bottom: 10px; } .msg { font-size: 0.9rem; margin-top: 15px; display: none; }</style></head>
<body>
    <div class="auth-wrapper"><div class="auth-box glass-panel animate-fade"><h2>NEW IDENTITY</h2><form id="regForm"><div class="form-group"><label>Choose Username</label><input type="text" id="username" class="form-control" required></div><div class="form-group"><label>Choose Password</label><input type="password" id="password" class="form-control" required></div><button type="submit" class="btn btn-neon-purple" style="width: 100%; margin-top: 10px;">Create Profile</button></form><div class="msg" id="msgBox"></div><div style="margin-top: 20px; font-size: 0.9rem;">Already registered? <a href="login.html" style="color: var(--neon-blue);">Access Portal</a></div></div></div>
    <script src="js/security.js"></script><script src="js/db.js"></script><script src="js/auth.js"></script>
    <script>document.getElementById('regForm').addEventListener('submit', (e) => { e.preventDefault(); const u = document.getElementById('username').value; const p = document.getElementById('password').value; const msg = document.getElementById('msgBox'); msg.style.display = 'block'; if(App.Auth.register(u, p)) { msg.style.color = 'var(--success)'; msg.innerText = 'Profile created.'; setTimeout(() => window.location.href = 'login.html', 1500); } else { msg.style.color = 'var(--danger)'; msg.innerText = 'Username active.'; } });</script>
</body></html>
