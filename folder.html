<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Folder - Dark Drive</title><link rel="stylesheet" href="css/main.css"><link rel="stylesheet" href="css/dashboard.css"></head>
<body>
    <div class="app-container"><div class="sidebar" id="sidebar-container"></div><div class="main-area"><div class="top-nav" id="topbar-container"></div><div class="content-area animate-fade"><div class="section-title"><h2 id="folder-title">Loading...</h2><button class="btn btn-neon-blue" onclick="window.location.href='dashboard.html'">🔙 Back</button></div><div class="grid-container" id="grid-container"></div></div></div></div>
    <script src="js/security.js"></script><script src="js/db.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
    <script>
        App.Auth.requireAuth(); App.UI.renderSidebar('dashboard'); App.UI.renderTopbar();
        const folderId = new URLSearchParams(window.location.search).get('id'); const db = App.DB.getData(); const folder = db.folders.find(f => f.id === folderId);
        if(folder) { document.getElementById('folder-title').innerText = '📁 ' + folder.name; const grid = document.getElementById('grid-container'); const videos = db.videos.filter(v => v.folderId === folderId); if(videos.length === 0) grid.innerHTML = '<p style="color:var(--text-secondary)">Empty.</p>'; videos.forEach(v => { grid.innerHTML += `<div class="card" onclick="window.location.href='player.html?vid=${v.id}'"><div class="card-icon" style="color: var(--neon-purple);">🎥</div><div class="card-title">${v.title}</div></div>`; }); } else { window.location.href = 'dashboard.html'; }
    </script>
</body></html>
