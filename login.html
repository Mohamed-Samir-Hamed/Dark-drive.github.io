<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Login - Dark Drive</title><link rel="stylesheet" href="css/main.css">
<style>.auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .auth-box { width: 100%; max-width: 420px; padding: 40px; text-align: center; } .auth-box h2 { font-size: 2.5rem; color: var(--neon-blue); margin-bottom: 10px; } .error { color: var(--danger); font-size: 0.9rem; margin-top: 15px; display: none; }</style></head>
<body>
    <div class="auth-wrapper"><div class="auth-box glass-panel animate-fade"><h2>ACCESS PORTAL</h2><p style="color: var(--text-secondary); margin-bottom: 30px;">Enter credentials to connect.</p><form id="loginForm"><div class="form-group"><label>Username</label><input type="text" id="username" class="form-control" required></div><div class="form-group"><label>Password</label><input type="password" id="password" class="form-control" required></div><button type="submit" class="btn btn-neon-blue" style="width: 100%; margin-top: 10px;">Authenticate</button></form><div class="error" id="errorMsg">Invalid credentials.</div><div style="margin-top: 20px; font-size: 0.9rem;">No clearance? <a href="register.html" style="color: var(--neon-purple);">Request Account</a></div></div></div>
    <script src="js/security.js"></script><script src="js/db.js"></script><script src="js/auth.js"></script>
    <script>document.getElementById('loginForm').addEventListener('submit', (e) => { e.preventDefault(); const u = document.getElementById('username').value; const p = document.getElementById('password').value; if(App.Auth.login(u, p)) { window.location.href = 'dashboard.html'; } else { document.getElementById('errorMsg').style.display = 'block'; } });</script>
</body></html>
